name: Run Tests

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  run-tests:
    name: "Test (${{matrix.os}}, Python ${{ matrix.python-version }})"
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    env:
      CC: clang
      CXX: clang++

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install platform-specific requirements (macOS)
      if: runner.os == 'macOS'
      run: brew install autoconf automake libtool

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python requirements
      run: |
        pip install meson-python pybind11
        pip install --upgrade --upgrade-strategy eager --no-build-isolation --editable .[dev]

    - name: Run tests
      run: |
        pytest

    - name: Typecheck with mypy
      run: |
        mypy

    - name: Check code with ruff
      run: |
        ruff check

    - name: Generate coverage report
      run: |
        coverage run -m pytest
        coverage xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

  run-tests-msys2:
    name: "Test (Windows MSYS2)"
    runs-on: windows-latest

    env:
      CC: clang
      CXX: clang++

    defaults:
      run:
        shell: "msys2 {0}"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        update: false
        install: >-
          mingw-w64-x86_64-autotools
          git
          gettext
          zlib
          mingw-w64-x86_64-python3
          mingw-w64-x86_64-python-pip
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-clang
          mingw-w64-x86_64-ca-certificates 

    - name: Create virtual environment
      run: |
        export SSL_CERT_FILE=/mingw64/etc/ssl/certs/ca-bundle.crt
        python3 -m venv .venv
        source .venv/bin/activate
        python3 -m pip install pybind11
        ninja --version
        python3 -m pip install .[dev]

    - name: print meson log
      if: always()
      run: cat build/cp312/meson-logs/meson-log.txt

    - name: Run tests
      run: |
        pytest

    - name: Typecheck with mypy
      run: |
        mypy

    - name: Check code with ruff
      run: |
        ruff check

    - name: Generate coverage report
      run: |
        coverage run -m pytest
        coverage xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
